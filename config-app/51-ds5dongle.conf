# DS5Dongle WirePlumber rules
#
# Rule 1 — stable node name for the loopback
#   Matches the dongle's playback sink by its ALSA components + media class
#   (works for any profile/PipeWire version: pro-audio "pro-output-0",
#   legacy "hw_Controller_0", etc.) and renames it to ds5_dongle_sink so the
#   loopback can reference it by a fixed name. Also pins priority.session = 0
#   so it never gets promoted to the default output.
#
#   The ~ prefix enables regex matching, which is required because some
#   PipeWire/WirePlumber versions append extra text to alsa.components
#   (e.g. "USB054c:0ce6:Sony_Interactive_Entertainment_…"). An exact-string
#   match would silently fail on those systems, leaving the node unnamed and
#   the loopback service stuck waiting for ds5_dongle_sink.
#
# Rule 2 — prevent default-sink takeover for any other dongle sink
#   The Pico presents as DualSense (VID:PID 054c:0ce6/0df2); WirePlumber may
#   also create ACP/HiFi sinks (alsa_output.usb-Sony_…__sink). priority.session
#   = 0 keeps them from stealing the default output on reconnect.
#
# Rule 3 — disable the Pico's capture (mic) endpoint
#   The pro-audio profile is duplex, so PipeWire keeps the USB capture
#   interface active alongside playback. On the Pico that capture traffic
#   contends with the Bluetooth link and silently kills the haptics output
#   (the controller stops vibrating). The dongle is a haptics/audio *output*
#   device only, so we disable its source to free the BT link. Without this
#   rule, auto-haptics work with `aplay` (playback-only) but not via PipeWire.

monitor.alsa.rules = [
  {
    matches = [
      {
        alsa.components = "~USB054c:0ce6"
        media.class     = "Audio/Sink"
      }
      {
        alsa.components = "~USB054c:0df2"
        media.class     = "Audio/Sink"
      }
    ]
    actions = {
      update-props = {
        node.name        = "ds5_dongle_sink"
        priority.session = 0
      }
    }
  }
  {
    matches = [
      {
        alsa.components = "~USB054c:0ce6"
        node.name       = "~alsa_output\\.usb-.*"
      }
      {
        alsa.components = "~USB054c:0df2"
        node.name       = "~alsa_output\\.usb-.*"
      }
    ]
    actions = {
      update-props = {
        priority.session = 0
      }
    }
  }
  {
    matches = [
      {
        alsa.components = "~USB054c:0ce6"
        media.class     = "Audio/Source"
      }
      {
        alsa.components = "~USB054c:0df2"
        media.class     = "Audio/Source"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
