name: Attach config app to existing release

# Manual trigger to build and attach Electron app artifacts (.AppImage,
# .deb, .rpm, .exe) to a release that was published before the CI was fixed.
#
# Usage:
#   gh workflow run attach-config-app.yml -f tag=app-v0.3.0

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. app-v0.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-config-app.yml
    with:
      ref: master
      upload_tag: ${{ inputs.tag }}
