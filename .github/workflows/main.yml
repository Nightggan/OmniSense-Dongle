name: Attach firmware to existing release

# Manual trigger to build and attach UF2 firmware files to a release
# that was published before the firmware CI was fixed.
#
# Usage:
#   gh workflow run attach-firmware.yml -f tag=v1.2.17-autohaptics

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and attach firmware to'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-firmware.yml
    with:
      # Build from master so all build-system fixes (pico.h, CI deps…)
      # are included. The version string and upload target still use the
      # release tag, so the UF2 reports the correct release version.
      ref: master
      version: ${{ inputs.tag }}
      asset_suffix: -${{ inputs.tag }}
      upload_tag: ${{ inputs.tag }}
