name: Auto Build Release firmware and attach to release

on:
  release:
    types: [created, published]

permissions:
  contents: write

jobs:
  build:
    name: Build and upload release UF2
    uses: ./.github/workflows/build-firmwares.yml
    with:
      ref: ${{ github.event.release.tag_name }}
      version: ${{ github.event.release.tag_name }}
      asset_suffix: -${{ github.event.release.tag_name }}
      upload_tag: ${{ github.event.release.tag_name }}
