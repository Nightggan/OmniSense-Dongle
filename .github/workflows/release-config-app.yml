name: Release config app

# Triggered when a release whose tag starts with "app-v" is published.
# Builds AppImage + deb + rpm + NSIS and attaches them to that release.
# Also updates the AUR package (requires AUR_SSH_KEY_APP secret) and
# submits a new COPR build (requires COPR_API_CONFIG secret).
#
# Workflow:
#   1. gh release create app-v1.0.0 --title "Config app v1.0.0" --notes "..."
#   2. Publish the release → this workflow fires automatically.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.event.release.tag_name, 'app-v')
    uses: ./.github/workflows/build-config-app.yml
    with:
      ref: ${{ github.event.release.tag_name }}
      upload_tag: ${{ github.event.release.tag_name }}

  # Requires the AUR_SSH_KEY_APP secret to be set in repository settings.
  # Generate with: ssh-keygen -t ed25519 -C "ds5-audio-haptics-bt AUR" -f aur_app_key
  # Then add the public key to your AUR account and the private key as AUR_SSH_KEY_APP.
  aur-update:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.event.release.tag_name, 'app-v')
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "APP_VERSION=${GITHUB_REF_NAME#app-v}" >> $GITHUB_ENV

      - name: Fetch tar.gz SHA256
        run: |
          URL="https://github.com/loteran/DS5Dongle/releases/download/${GITHUB_REF_NAME}/ds5-audio-haptics-bt-${APP_VERSION}-linux-x64.tar.gz"
          curl -fsSL "$URL" -o /tmp/app.tar.gz
          echo "APP_SHA256=$(sha256sum /tmp/app.tar.gz | awk '{print $1}')" >> $GITHUB_ENV

      - name: Set up SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY_APP }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'SSHCONF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
          SSHCONF

      - name: Clone and update AUR
        run: |
          git clone ssh://aur@aur.archlinux.org/ds5-audio-haptics-bt.git /tmp/aur
          sed "s/pkgver=.*/pkgver=${APP_VERSION}/; s/sha256sums=('[^']*')/sha256sums=('${APP_SHA256}')/" \
            aur-config-app/PKGBUILD > /tmp/aur/PKGBUILD
          python3 - <<PYEOF
          import re
          src = open('aur-config-app/.SRCINFO').read()
          import os
          ver = os.environ['APP_VERSION']
          sha = os.environ['APP_SHA256']
          src = re.sub(r'pkgver = .*', f'pkgver = {ver}', src)
          src = re.sub(r'sha256sums = \S+', f'sha256sums = {sha}', src, count=1)
          src = re.sub(r'ds5-audio-haptics-bt-[\d.]+-linux-x64\.tar\.gz', f'ds5-audio-haptics-bt-{ver}-linux-x64.tar.gz', src)
          open('/tmp/aur/.SRCINFO', 'w').write(src)
          PYEOF
          cd /tmp/aur
          git config user.name "loteran"
          git config user.email "axel.valadon@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to push" || \
            git commit -m "Update to v${APP_VERSION}" && git push

  copr-update:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.event.release.tag_name, 'app-v')
    steps:
      - uses: actions/checkout@v4

      - name: Install copr-cli
        run: pip install copr-cli

      - name: Configure COPR credentials
        env:
          COPR_API_CONFIG: ${{ secrets.COPR_API_CONFIG }}
        run: |
          mkdir -p ~/.config
          echo "$COPR_API_CONFIG" > ~/.config/copr

      - name: Submit COPR build
        run: |
          copr-cli buildscm loteran/ds5-audio-haptics-bt \
            --clone-url https://github.com/loteran/DS5Dongle \
            --commit master \
            --spec ds5-audio-haptics-bt.spec \
            --type git \
            --method make_srpm \
            --enable-net on \
            --nowait
