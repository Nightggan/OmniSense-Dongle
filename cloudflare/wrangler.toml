name               = "ds5-telemetry"
main               = "worker.js"
compatibility_date = "2024-01-01"

# ── D1 database ────────────────────────────────────────────────────────────────
# Deploy steps:
#   1. Install Wrangler:  npm install -g wrangler
#   2. Login:             wrangler login
#   3. Create D1 db:      wrangler d1 create ds5-telemetry
#      → copy the database_id printed by that command into database_id below
#   4. Apply schema:      wrangler d1 execute ds5-telemetry --file=schema.sql
#   5. Deploy worker:     wrangler deploy
#   6. Update TELEMETRY_ENDPOINT in config-electron/src/main/telemetry/telemetry.ts
#      with the real workers.dev URL (shown after `wrangler deploy`)
[[d1_databases]]
binding       = "DB"
database_name = "ds5-telemetry"
database_id   = "<YOUR_DATABASE_ID>"  # replace after step 3

# ── Routes (optional custom domain) ───────────────────────────────────────────
# Uncomment and fill in if you want a custom subdomain:
# routes = [
#   { pattern = "ds5-telemetry.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]
